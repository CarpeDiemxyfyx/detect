# ============================================================
#  训练配置文件: 完整改进模型 (SADR + BDFR)
#  用法: python scripts/train.py --cfg configs/train_full.yaml
# ============================================================

# ---------- 模型 ----------
model:
  yaml: models/yolov11-road-anomaly.yaml   # 模型结构定义
  pretrained: yolo11m.pt                    # 预训练权重
  name: yolov11m_improved                   # 实验名称
  desc: "YOLOv11m + SADR + BDFR (完整改进)"

# ---------- 数据 ----------
data:
  dataset: dataset/road_anomaly.yaml        # 数据集配置
  imgsz: 640                                # 输入图像尺寸

# ---------- 训练基本参数 ----------
train:
  epochs: 200
  batch: 4                                  # RTX 4060 (8GB VRAM) 适配
  device: "0"                               # GPU 设备号, "cpu" 表示CPU训练
  workers: 4                                # 显存受限时减少workers避免内存溢出
  amp: true                                 # 混合精度训练
  patience: 30                              # 早停耐心值
  save_period: 10                           # 每N轮保存一次checkpoint
  cos_lr: true                              # 余弦学习率调度
  close_mosaic: 10                          # 最后N轮关闭mosaic
  val: true                                 # 训练中是否执行验证
  plots: true                               # 是否生成训练曲线图
  exist_ok: true                            # 覆盖同名实验

# ---------- 优化器 ----------
optimizer:
  type: AdamW
  lr0: 0.0005                              # √(4/16)×0.001, AdamW小batch缩放
  lrf: 0.01                                 # 最终学习率 = lr0 * lrf
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8

# ---------- 数据增强 ----------
augment:
  hsv_h: 0.015                              # HSV-Hue 扰动幅度
  hsv_s: 0.7                                # HSV-Saturation 扰动幅度
  hsv_v: 0.4                                # HSV-Value 扰动幅度
  degrees: 0.0                              # 旋转角度范围
  translate: 0.1                            # 平移比例
  scale: 0.5                                # 缩放比例
  shear: 0.0                                # 剪切变换
  perspective: 0.001                        # 透视变换
  flipud: 0.0                               # 上下翻转概率
  fliplr: 0.5                               # 左右翻转概率
  mosaic: 1.0                               # Mosaic增强概率
  mixup: 0.15                               # MixUp增强概率
  copy_paste: 0.1                           # Copy-Paste增强概率

# ---------- 损失函数权重 ----------
loss:
  box: 7.5                                  # 边框损失权重
  cls: 0.5                                  # 分类损失权重
  dfl: 1.5                                  # 分布焦点损失权重

# ---------- 输出路径 ----------
output:
  project: runs/road_anomaly               # 实验输出根目录
